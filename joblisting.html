<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Connect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9fafb;
    }
    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }
    .header {
      background-color: #111827;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      animation: slideDown 0.8s ease;
    }
    .quote {
      text-align: center;
      font-size: 20px;
      color: #4b5563;
      font-family: 'Georgia', serif;
      margin-top: 10px;
      opacity: 0;
      transform: scale(0.9);
      animation: fadeInScale 1.5s ease forwards;
    }
    .top-section {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    .form-container, .image-container {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      flex: 1;
      transform: translateY(30px);
      opacity: 0;
      animation: slideIn 0.8s ease forwards;
    }
    .image-container img {
      width: 100%;
      border-radius: 8px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #111827;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #374151;
      transform: scale(1.05);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background-color: #f3f4f6;
      cursor: pointer;
    }
    .action-btn {
      background-color: #dc2626;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .action-btn:hover {
      background-color: #b91c1c;
    }
    .search-bar {
      margin-bottom: 10px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      background-color: #111827;
      color: white;
      border-radius: 4px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }
    .toast.show {
      opacity: 1;
      visibility: visible;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="header">Welcome to Job Connect</div>
  <div class="quote">"Empowering communities through opportunity – Hope Nexus, where every job counts."</div>

  <div class="container">
    <div class="top-section">
      <div class="form-container">
        <h2>Post a Job</h2>
        <form action="job.php" method="post"></form>
        <input type="text" id="title" placeholder="Job Title" value="title"/>
        <input type="text" id="description" placeholder="Description" value="description" />
        <input type="text" id="location" placeholder="Location" value="location" />
        <input type="text" id="contact" placeholder="Contact Info" value="contact"/>
        <button onclick="addJob()">Submit</button>
      </div>

      <div class="image-container">
        <img src="job.png" alt="Community" />
      </div>
    </div>

    <div class="job-list-container">
      <input type="text" id="search" class="search-bar" onkeyup="filterJobs()" placeholder="Search jobs..." />
      <table>
        <thead>
          <tr>
            <th onclick="sortTable(0)">Title</th>
            <th>Description</th>
            <th onclick="sortTable(2)">Location</th>
            <th>Contact</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="job-list"></tbody>
      </table>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // Store jobs array
    let jobs = [];

    // Load jobs from localStorage on page load
    function loadJobs() {
      const storedJobs = localStorage.getItem('jobs');
      if (storedJobs) {
        jobs = JSON.parse(storedJobs);
        renderJobs();
      }
    }

    // Save jobs to localStorage
    function saveJobs() {
      localStorage.setItem('jobs', JSON.stringify(jobs));
    }

    // Show toast notification
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.backgroundColor = isError ? '#ef4444' : '#111827';
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    function addJob() {
      const title = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const location = document.getElementById('location').value;
      const contact = document.getElementById('contact').value;

      if (title && description && location && contact) {
        const newJob = {
          title: title,
          description: description,
          location: location,
          contact: contact
        };

        // Add to jobs array
        jobs.push(newJob);
        
        // Save to localStorage
        saveJobs();
        
        // Update the display
        renderJobs();

        // Clear form fields
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        document.getElementById('location').value = '';
        document.getElementById('contact').value = '';
        
        // Show confirmation
        showToast('Job posted successfully');
      } else {
        showToast('Please fill in all fields', true);
      }
    }

    function deleteJob(index) {
      // Remove job from array
      jobs.splice(index, 1);
      
      // Save updated array
      saveJobs();
      
      // Update display
      renderJobs();
      
      // Show confirmation
      showToast('Job deleted successfully');
    }

    function renderJobs() {
      const table = document.getElementById('job-list');
      const searchTerm = document.getElementById('search').value.toLowerCase();
      
      // Clear the table
      table.innerHTML = '';
      
      // Filter jobs by search term
      const filteredJobs = jobs.filter(job => 
        job.title.toLowerCase().includes(searchTerm) || 
        job.description.toLowerCase().includes(searchTerm) ||
        job.location.toLowerCase().includes(searchTerm)
      );
      
      // Add filtered jobs to table
      filteredJobs.forEach((job, index) => {
        const row = table.insertRow();
        row.innerHTML = `
          <td>${job.title}</td>
          <td>${job.description}</td>
          <td>${job.location}</td>
          <td>${job.contact}</td>
          <td><button class="action-btn" onclick="deleteJob(${index})">Delete</button></td>
        `;
      });
    }

    function filterJobs() {
      renderJobs();
    }

    function sortTable(columnIndex) {
      jobs.sort((a, b) => {
        const values = [
          [a.title, b.title],
          [null, null], // description column is not sortable
          [a.location, b.location]
        ];
        
        const [valueA, valueB] = values[columnIndex];
        return valueA.localeCompare(valueB);
      });
      
      saveJobs();
      renderJobs();
    }

    // Initialize the application
    loadJobs();
  </script>
</body>
</html>
