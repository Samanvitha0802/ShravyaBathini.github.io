<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Job Connect</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9fafb;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .header {
      background-color: #111827;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      animation: slideDown 0.8s ease;
    }

    .quote {
      text-align: center;
      font-size: 20px;
      color: #4b5563;
      font-family: 'Georgia', serif;
      margin-top: 10px;
      opacity: 0;
      transform: scale(0.9);
      animation: fadeInScale 1.5s ease forwards;
    }

    .top-section {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .form-container,
    .image-container {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      flex: 1;
      transform: translateY(30px);
      opacity: 0;
      animation: slideIn 0.8s ease forwards;
    }

    .image-container img {
      width: 100%;
      border-radius: 8px;
    }

    input,
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    button {
      background-color: #111827;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #374151;
      transform: scale(1.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #f3f4f6;
      cursor: pointer;
    }

    .action-btn {
      background-color: #dc2626;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .action-btn:hover {
      background-color: #b91c1c;
    }

    .search-bar {
      margin-bottom: 10px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      background-color: #111827;
      color: white;
      border-radius: 4px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="header">
    Welcome to Job Connect
  </div>

  <div class="quote">
    "Empowering communities through opportunity – Hope Nexus, where every job counts."
  </div>

  <div class="container">

    <div class="top-section">

      <!-- Form -->
      <div class="form-container">

        <h2>Post a Job</h2>

        <input type="text" id="title" placeholder="Job Title" />

        <input type="text" id="description" placeholder="Description" />

        <input type="text" id="location" placeholder="Location" />

        <input type="text" id="contact" placeholder="Contact Info" />

        <button onclick="addJob()">
          Submit
        </button>

      </div>

      <!-- Image -->
      <div class="image-container">

        <img src="job.png" alt="Community" />

      </div>

    </div>

    <!-- Job List -->
    <div class="job-list-container">

      <input
        type="text"
        id="search"
        class="search-bar"
        onkeyup="filterJobs()"
        placeholder="Search jobs..."
      />

      <table>

        <thead>

          <tr>

            <th>Title</th>

            <th>Description</th>

            <th>Location</th>

            <th>Contact</th>

            <th>Action</th>

          </tr>

        </thead>

        <tbody id="job-list"></tbody>

      </table>

    </div>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>

    // Show Toast
    function showToast(message, isError = false) {

      const toast = document.getElementById("toast");

      toast.textContent = message;

      toast.style.backgroundColor =
        isError ? "#ef4444" : "#111827";

      toast.classList.add("show");

      setTimeout(() => {

        toast.classList.remove("show");

      }, 3000);

    }


    // Load Jobs
    async function loadJobs() {

      try {

        const response =
          await fetch("http://localhost:5000/api/jobs");

        const jobs = await response.json();

        renderJobs(jobs);

      } catch (error) {

        console.log(error);

      }

    }


    // Add Job
    async function addJob() {

      const title =
        document.getElementById("title").value;

      const description =
        document.getElementById("description").value;

      const location =
        document.getElementById("location").value;

      const contact =
        document.getElementById("contact").value;


      if (!title || !description || !location || !contact) {

        showToast("Please fill all fields", true);

        return;

      }


      const formData = {

        title,
        description,
        location,
        contact

      };


      try {

        const response =
          await fetch("http://localhost:5000/api/jobs", {

            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify(formData)

          });

        const data = await response.json();

        showToast(data.message);

        document.getElementById("title").value = "";

        document.getElementById("description").value = "";

        document.getElementById("location").value = "";

        document.getElementById("contact").value = "";

        loadJobs();

      } catch (error) {

        console.log(error);

        showToast("Error adding job", true);

      }

    }


    // Render Jobs
    function renderJobs(jobs) {

      const table =
        document.getElementById("job-list");

      const searchTerm =
        document.getElementById("search")
        .value
        .toLowerCase();

      table.innerHTML = "";


      const filteredJobs =
        jobs.filter(job =>

          job.title.toLowerCase().includes(searchTerm) ||

          job.description.toLowerCase().includes(searchTerm) ||

          job.location.toLowerCase().includes(searchTerm)

        );


      filteredJobs.forEach((job) => {

        const row = table.insertRow();

        row.innerHTML = `

          <td>${job.title}</td>

          <td>${job.description}</td>

          <td>${job.location}</td>

          <td>${job.contact}</td>

          <td>

            <button
              class="action-btn"
              onclick="deleteJob('${job._id}')"
            >
              Delete
            </button>

          </td>

        `;

      });

    }


    // Delete Job
    async function deleteJob(id) {

      try {

        await fetch(
          `http://localhost:5000/api/jobs/${id}`,
          {
            method: "DELETE"
          }
        );

        showToast("Job deleted successfully");

        loadJobs();

      } catch (error) {

        console.log(error);

        showToast("Error deleting job", true);

      }

    }


    // Search Filter
    function filterJobs() {

      loadJobs();

    }


    // Initial Load
    loadJobs();

  </script>

</body>

</html>
